# sunny-ci.yml - CI pipeline by Surender (Sunny) Dagar
name: Sunny Dagar CI Pipeline

# Trigger: run on every push to the repository
on: [push]

jobs:
  lint-and-test:
    # Run on a fresh GitHub-hosted Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Action 1: check out the repository code onto the runner
      - name: Check out repository code
        uses: actions/checkout@v4

      # Action 2: set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Action 3: install dependencies (flake8) from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Action 4: lint the code with flake8 to enforce PEP 8 style
      - name: Lint with flake8
        run: flake8 . --max-line-length=100

      # Action 5: run the unit tests with unittest
      - name: Run unit tests
        run: python -m unittest test_calculator.py -v
